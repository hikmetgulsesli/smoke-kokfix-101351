</div>

<h2 class="font-headline text-2xl font-semibold text-center text-on-surface tracking-tight mb-3">
            Bu kaydı silmek istediğinize emin misiniz?
        </h2>
<p class="text-on-surface-variant text-center text-sm mb-10 leading-relaxed max-w-[280px]">

        </p>

<div class="flex flex-col-reverse sm:flex-row w-full gap-3 sm:gap-4">

<button class="flex-1 py-3.5 px-5 rounded-xl bg-surface-bright/40 hover:bg-surface-bright/70 text-on-surface font-medium transition-all duration-300 hover:scale-[1.02] active:scale-[0.98] outline outline-1 outline-transparent hover:outline-outline-variant/20">

<button class="flex-1 py-3.5 px-5 rounded-xl bg-error hover:bg-[#ff9c90] text-on-error font-semibold transition-all duration-300 hover:scale-[1.02] active:scale-[0.98] shadow-[0_0_20px_rgba(255,180,171,0.15)] hover:shadow-[0_0_25px_rgba(255,180,171,0.25)]">
