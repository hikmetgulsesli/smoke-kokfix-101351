<!DOCTYPE html>

<html class="dark" lang="tr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>SAYAÇ - Yeni Kayıt Ekle</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "surface-dim": "#131313",
                        "on-surface": "#e5e2e1",
                        "tertiary-fixed-dim": "#ffb869",
                        "surface-container-low": "#1c1b1b",
                        "on-secondary": "#381385",
                        "primary-fixed": "#e9ddff",
                        "inverse-on-surface": "#313030",
                        "on-primary": "#3c0091",
                        "surface": "#131313",
                        "surface-container-highest": "#353534",
                        "background": "#131313",
                        "on-primary-fixed-variant": "#5516be",
                        "on-primary-container": "#340080",
                        "on-secondary-fixed": "#21005e",
                        "error": "#ffb4ab",
                        "secondary": "#cebdff",
                        "on-surface-variant": "#cbc3d7",
                        "secondary-fixed-dim": "#cebdff",
                        "tertiary-container": "#ca801e",
                        "on-error-container": "#ffdad6",
                        "error-container": "#93000a",
                        "secondary-container": "#4f319c",
                        "primary-fixed-dim": "#d0bcff",
                        "surface-container-lowest": "#0e0e0e",
                        "primary": "#d0bcff",
                        "on-secondary-container": "#bea8ff",
                        "inverse-primary": "#6d3bd7",
                        "tertiary": "#ffb869",
                        "outline": "#958ea0",
                        "on-tertiary-fixed": "#2c1700",
                        "surface-container": "#201f1f",
                        "surface-variant": "#353534",
                        "surface-container-high": "#2a2a2a",
                        "on-tertiary": "#482900",
                        "surface-bright": "#3a3939",
                        "on-tertiary-container": "#3f2300",
                        "on-tertiary-fixed-variant": "#673d00",
                        "on-primary-fixed": "#23005c",
                        "outline-variant": "#494454",
                        "inverse-surface": "#e5e2e1",
                        "secondary-fixed": "#e8ddff",
                        "on-background": "#e5e2e1",
                        "primary-container": "#a078ff",
                        "on-secondary-fixed-variant": "#4f319c",
                        "surface-tint": "#d0bcff",
                        "on-error": "#690005",
                        "tertiary-fixed": "#ffdcbb"
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    fontFamily: {
                        "headline": ["Inter", "sans-serif"],
                        "display": ["Inter", "sans-serif"],
                        "body": ["Inter", "sans-serif"],
                        "label": ["Inter", "sans-serif"]
                    }
                }
            }
        }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-surface-dim text-on-surface h-screen w-screen overflow-hidden flex flex-col font-body">
<!-- Mock Background (Main Screen behind Modal) -->
<div class="absolute inset-0 z-0 opacity-40 pointer-events-none flex flex-col">
<!-- TopAppBar (Simulated Background) -->
<header class="flex justify-between items-center w-full px-6 py-4 sticky top-0 bg-[#0e0e0e]/80 backdrop-blur-2xl">
<h1 class="text-xl font-black tracking-widest text-[#d0bcff] uppercase font-inter">SAYAÇ</h1>
<div class="flex gap-4 text-[#d0bcff]">
<span class="material-symbols-outlined hover:bg-neutral-800/40 hover:scale-110 transition-all duration-300 rounded-full p-1 cursor-pointer">add</span>
<span class="material-symbols-outlined hover:bg-neutral-800/40 hover:scale-110 transition-all duration-300 rounded-full p-1 cursor-pointer">history</span>
<span class="material-symbols-outlined hover:bg-neutral-800/40 hover:scale-110 transition-all duration-300 rounded-full p-1 cursor-pointer">settings</span>
</div>
</header>
<main class="flex-grow flex flex-col items-center justify-center p-6">
<!-- Simulated Counter Display -->
<div class="text-[8rem] font-black tracking-widest text-on-surface leading-none opacity-50">42</div>
</main>
</div>
<!-- Modal Overlay Backdrop -->
<div class="fixed inset-0 z-40 bg-surface-container-lowest/80 backdrop-blur-md flex items-center justify-center p-4">
<!-- Add New Record Modal -->
<div class="bg-surface-container-low rounded-2xl w-full max-w-md overflow-hidden relative shadow-[0_20px_60px_rgba(0,0,0,0.7)] flex flex-col outline outline-1 outline-outline-variant/10">
<!-- Modal Header -->
<div class="px-6 py-5 flex items-center justify-between z-10 relative">
<h2 class="text-xl font-semibold text-on-surface font-headline tracking-tight">Yeni Kayıt Ekle</h2>
<button class="text-on-surface-variant hover:text-on-surface transition-colors p-2 -mr-2 rounded-full hover:bg-surface-container-highest">
<span class="material-symbols-outlined">close</span>
</button>
</div>
<!-- Modal Body (Form) -->
<div class="px-6 py-4 flex flex-col gap-6 z-10 relative">
<!-- Title Field -->
<div class="flex flex-col gap-2">
<label class="text-sm font-medium text-on-surface-variant font-label" for="title">Başlık <span class="text-primary">*</span></label>
<div class="relative">
<input class="w-full bg-surface-container-highest text-on-surface placeholder:text-on-surface-variant/50 border-0 rounded-lg py-3 px-4 focus:ring-0 focus:outline-none focus:bg-surface-bright transition-colors peer" id="title" placeholder="Sayaç adı girin" type="text"/>
<!-- Active Glow Line -->
<div class="absolute bottom-0 left-0 w-full h-[2px] bg-primary scale-x-0 peer-focus:scale-x-100 transition-transform origin-left rounded-b-lg opacity-80"></div>
</div>
</div>
<!-- Note Field -->
<div class="flex flex-col gap-2">
<label class="text-sm font-medium text-on-surface-variant font-label" for="note">Not (İsteğe Bağlı)</label>
<div class="relative">
<textarea class="w-full bg-surface-container-highest text-on-surface placeholder:text-on-surface-variant/50 border-0 rounded-lg py-3 px-4 focus:ring-0 focus:outline-none focus:bg-surface-bright transition-colors resize-none peer" id="note" placeholder="Detay ekleyin..." rows="3"></textarea>
<!-- Active Glow Line -->
<div class="absolute bottom-[4px] left-0 w-full h-[2px] bg-primary scale-x-0 peer-focus:scale-x-100 transition-transform origin-left rounded-b-lg opacity-80"></div>
</div>
</div>
</div>
<!-- Modal Footer (Actions) -->
<div class="px-6 py-5 flex justify-end gap-3 z-10 relative mt-2">
<button class="px-5 py-2.5 rounded-lg text-sm font-medium text-on-surface bg-surface-container-highest hover:bg-surface-bright transition-all duration-200">
                    İptal
                </button>
<button class="px-6 py-2.5 rounded-lg text-sm font-medium text-white bg-gradient-to-r from-violet-500 to-violet-400 hover:scale-[1.02] active:scale-95 transition-all duration-200 shadow-[0_0_15px_rgba(208,188,255,0.2)] hover:shadow-[0_0_25px_rgba(208,188,255,0.4)]">
                    Oluştur
                </button>
</div>
</div>
</div>
</body></html>
