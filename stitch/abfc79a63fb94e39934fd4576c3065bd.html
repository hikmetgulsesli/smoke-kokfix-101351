<!DOCTYPE html>

<html class="dark" lang="tr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>SAYAÇ - Ayarlar</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-dim": "#131313",
                        "on-surface": "#e5e2e1",
                        "tertiary-fixed-dim": "#ffb869",
                        "surface-container-low": "#1c1b1b",
                        "on-secondary": "#381385",
                        "primary-fixed": "#e9ddff",
                        "inverse-on-surface": "#313030",
                        "on-primary": "#3c0091",
                        "surface": "#131313",
                        "surface-container-highest": "#353534",
                        "background": "#131313",
                        "on-primary-fixed-variant": "#5516be",
                        "on-primary-container": "#340080",
                        "on-secondary-fixed": "#21005e",
                        "error": "#ffb4ab",
                        "secondary": "#cebdff",
                        "on-surface-variant": "#cbc3d7",
                        "secondary-fixed-dim": "#cebdff",
                        "tertiary-container": "#ca801e",
                        "on-error-container": "#ffdad6",
                        "error-container": "#93000a",
                        "secondary-container": "#4f319c",
                        "primary-fixed-dim": "#d0bcff",
                        "surface-container-lowest": "#0e0e0e",
                        "primary": "#d0bcff",
                        "on-secondary-container": "#bea8ff",
                        "inverse-primary": "#6d3bd7",
                        "tertiary": "#ffb869",
                        "outline": "#958ea0",
                        "on-tertiary-fixed": "#2c1700",
                        "surface-container": "#201f1f",
                        "surface-variant": "#353534",
                        "surface-container-high": "#2a2a2a",
                        "on-tertiary": "#482900",
                        "surface-bright": "#3a3939",
                        "on-tertiary-container": "#3f2300",
                        "on-tertiary-fixed-variant": "#673d00",
                        "on-primary-fixed": "#23005c",
                        "outline-variant": "#494454",
                        "inverse-surface": "#e5e2e1",
                        "secondary-fixed": "#e8ddff",
                        "on-background": "#e5e2e1",
                        "primary-container": "#a078ff",
                        "on-secondary-fixed-variant": "#4f319c",
                        "surface-tint": "#d0bcff",
                        "on-error": "#690005",
                        "tertiary-fixed": "#ffdcbb"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Inter", "sans-serif"],
                        "display": ["Inter", "sans-serif"],
                        "body": ["Inter", "sans-serif"],
                        "label": ["Inter", "sans-serif"]
                    }
                }
            }
        }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-surface-dim text-on-surface min-h-screen flex flex-col antialiased">
<!-- TopAppBar (Web) -->
<header class="hidden md:flex justify-between items-center w-full px-6 py-4 sticky top-0 z-50 bg-[#0e0e0e]/80 backdrop-blur-2xl font-inter tracking-tight shadow-none bg-neutral-900/50">
<div class="text-xl font-black tracking-widest text-[#d0bcff] uppercase">SAYAÇ</div>
<nav class="flex gap-8 items-center">
<a class="text-neutral-500 font-medium hover:text-[#d0bcff] hover:bg-neutral-800/40 hover:scale-110 transition-all duration-300 px-3 py-2 rounded-lg" href="#">Sayaç</a>
<a class="text-neutral-500 font-medium hover:text-[#d0bcff] hover:bg-neutral-800/40 hover:scale-110 transition-all duration-300 px-3 py-2 rounded-lg" href="#">Geçmiş</a>
<a class="text-[#d0bcff] font-bold hover:bg-neutral-800/40 hover:scale-110 transition-all duration-300 px-3 py-2 rounded-lg" href="#">Ayarlar</a>
</nav>
<div class="flex gap-4">
<button class="text-[#d0bcff] hover:bg-neutral-800/40 hover:scale-110 transition-all duration-300 active:scale-95 p-2 rounded-full">
<span class="material-symbols-outlined">add</span>
</button>
<button class="text-[#d0bcff] hover:bg-neutral-800/40 hover:scale-110 transition-all duration-300 active:scale-95 p-2 rounded-full">
<span class="material-symbols-outlined">history</span>
</button>
<button class="text-[#d0bcff] hover:bg-neutral-800/40 hover:scale-110 transition-all duration-300 active:scale-95 p-2 rounded-full">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">settings</span>
</button>
</div>
</header>
<!-- Main Canvas -->
<main class="flex-grow w-full max-w-4xl mx-auto px-6 py-12 mb-24 md:mb-12">
<div class="space-y-2 mb-12">
<h1 class="text-3xl md:text-4xl font-headline font-bold tracking-tight text-on-surface">Ayarlar</h1>
<p class="text-on-surface-variant font-body">Sayaç deneyiminizi özelleştirin.</p>
</div>
<div class="space-y-12">
<!-- Theme Section -->
<section class="space-y-6">
<h2 class="text-lg font-headline font-semibold text-primary-fixed-dim">Görünüm</h2>
<div class="bg-surface-container-low rounded-xl p-1 grid grid-cols-2 gap-2 shadow-[inset_0_2px_4px_rgba(0,0,0,0.2)]">
<button class="bg-surface-container-highest text-primary font-label font-medium py-4 px-6 rounded-lg shadow-sm flex items-center justify-center gap-3 ring-1 ring-outline-variant/10 transition-transform active:scale-95">
<span class="material-symbols-outlined text-[20px]" style="font-variation-settings: 'FILL' 1;">dark_mode</span>
                        Koyu
                    </button>
<button class="text-on-surface-variant font-label font-medium py-4 px-6 rounded-lg hover:bg-surface-container transition-colors flex items-center justify-center gap-3 active:scale-95">
<span class="material-symbols-outlined text-[20px]">settings_brightness</span>
                        Sistem
                    </button>
</div>
</section>
<!-- Step Size Section -->
<section class="space-y-6">
<div class="space-y-1">
<h2 class="text-lg font-headline font-semibold text-primary-fixed-dim">Sayaç Adım Boyutu</h2>
<p class="text-sm text-on-surface-variant font-body">Artırma ve azaltma miktarını belirleyin.</p>
</div>
<div class="grid grid-cols-1 md:grid-cols-3 gap-4">
<button class="bg-surface-container-highest relative overflow-hidden rounded-xl p-6 flex flex-col items-center justify-center gap-2 group ring-1 ring-primary/30 transition-all hover:scale-[1.02] active:scale-95 shadow-[0_4px_24px_rgba(208,188,255,0.05)]">
<div class="absolute inset-0 bg-gradient-to-b from-primary/10 to-transparent opacity-50"></div>
<span class="text-3xl font-display font-bold text-primary">+1</span>
<span class="text-xs font-label text-primary font-medium tracking-wide uppercase">Varsayılan</span>
</button>
<button class="bg-surface-container-low rounded-xl p-6 flex flex-col items-center justify-center gap-2 group hover:bg-surface-container transition-all hover:scale-[1.02] active:scale-95">
<span class="text-3xl font-display font-bold text-on-surface-variant group-hover:text-on-surface">+5</span>
<span class="text-xs font-label text-on-surface-variant group-hover:text-on-surface font-medium tracking-wide uppercase">Hızlı</span>
</button>
<button class="bg-surface-container-low rounded-xl p-6 flex flex-col items-center justify-center gap-2 group hover:bg-surface-container transition-all hover:scale-[1.02] active:scale-95">
<span class="text-3xl font-display font-bold text-on-surface-variant group-hover:text-on-surface">+10</span>
<span class="text-xs font-label text-on-surface-variant group-hover:text-on-surface font-medium tracking-wide uppercase">Maksimum</span>
</button>
</div>
</section>
<!-- Danger Zone -->
<section class="space-y-6 pt-8 border-t border-white/5">
<h2 class="text-lg font-headline font-semibold text-error-container">Gelişmiş</h2>
<div class="bg-surface-container-low rounded-xl p-6 flex flex-col md:flex-row justify-between items-start md:items-center gap-6">
<div>
<h3 class="font-headline font-medium text-on-surface mb-1">Tüm Verileri Sıfırla</h3>
<p class="text-sm font-body text-on-surface-variant">Sayaç geçmişi ve ayarlar dahil olmak üzere her şeyi siler.</p>
</div>
<button class="bg-surface-dim text-error border border-error/20 hover:bg-error/10 font-label font-medium px-6 py-3 rounded-lg transition-colors active:scale-95 whitespace-nowrap">
                        Sıfırla
                    </button>
</div>
</section>
</div>
</main>
<!-- BottomNavBar (Mobile) -->
<nav class="md:hidden fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-8 pt-4 bg-[#0e0e0e]/90 backdrop-blur-3xl rounded-t-[32px] border-t border-white/5 shadow-[0_-8px_30px_rgb(0,0,0,0.5)]">
<a class="flex flex-col items-center justify-center text-neutral-500 px-5 py-2 font-inter text-[10px] font-medium uppercase tracking-widest hover:text-neutral-200 transition-colors active:scale-90 transition-transform duration-200" href="#">
<span class="material-symbols-outlined mb-1 text-[24px]">timer</span>
            Sayaç
        </a>
<a class="flex flex-col items-center justify-center text-neutral-500 px-5 py-2 font-inter text-[10px] font-medium uppercase tracking-widest hover:text-neutral-200 transition-colors active:scale-90 transition-transform duration-200" href="#">
<span class="material-symbols-outlined mb-1 text-[24px]">history</span>
            Geçmiş
        </a>
<a class="flex flex-col items-center justify-center text-[#d0bcff] bg-[#8B5CF6]/10 rounded-2xl px-5 py-2 font-inter text-[10px] font-medium uppercase tracking-widest active:scale-90 transition-transform duration-200" href="#">
<span class="material-symbols-outlined mb-1 text-[24px]" style="font-variation-settings: 'FILL' 1;">settings</span>
            Ayarlar
        </a>
</nav>
</body></html>
