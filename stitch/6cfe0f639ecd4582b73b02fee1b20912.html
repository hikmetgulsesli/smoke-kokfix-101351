<!DOCTYPE html>

<html class="dark" lang="tr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>SAYAÇ - Dashboard</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-dim": "#131313",
                        "on-surface": "#e5e2e1",
                        "tertiary-fixed-dim": "#ffb869",
                        "surface-container-low": "#1c1b1b",
                        "on-secondary": "#381385",
                        "primary-fixed": "#e9ddff",
                        "inverse-on-surface": "#313030",
                        "on-primary": "#3c0091",
                        "surface": "#131313",
                        "surface-container-highest": "#353534",
                        "background": "#131313",
                        "on-primary-fixed-variant": "#5516be",
                        "on-primary-container": "#340080",
                        "on-secondary-fixed": "#21005e",
                        "error": "#ffb4ab",
                        "secondary": "#cebdff",
                        "on-surface-variant": "#cbc3d7",
                        "secondary-fixed-dim": "#cebdff",
                        "tertiary-container": "#ca801e",
                        "on-error-container": "#ffdad6",
                        "error-container": "#93000a",
                        "secondary-container": "#4f319c",
                        "primary-fixed-dim": "#d0bcff",
                        "surface-container-lowest": "#0e0e0e",
                        "primary": "#d0bcff",
                        "on-secondary-container": "#bea8ff",
                        "inverse-primary": "#6d3bd7",
                        "tertiary": "#ffb869",
                        "outline": "#958ea0",
                        "on-tertiary-fixed": "#2c1700",
                        "surface-container": "#201f1f",
                        "surface-variant": "#353534",
                        "surface-container-high": "#2a2a2a",
                        "on-tertiary": "#482900",
                        "surface-bright": "#3a3939",
                        "on-tertiary-container": "#3f2300",
                        "on-tertiary-fixed-variant": "#673d00",
                        "on-primary-fixed": "#23005c",
                        "outline-variant": "#494454",
                        "inverse-surface": "#e5e2e1",
                        "secondary-fixed": "#e8ddff",
                        "on-background": "#e5e2e1",
                        "primary-container": "#a078ff",
                        "on-secondary-fixed-variant": "#4f319c",
                        "surface-tint": "#d0bcff",
                        "on-error": "#690005",
                        "tertiary-fixed": "#ffdcbb"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Inter", "sans-serif"],
                        "display": ["Inter", "sans-serif"],
                        "body": ["Inter", "sans-serif"],
                        "label": ["Inter", "sans-serif"]
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-surface-container-lowest text-on-surface font-body min-h-screen flex flex-col antialiased selection:bg-primary/30 selection:text-primary">
<!-- TopAppBar (Web & Mobile) -->
<header class="flex justify-between items-center w-full px-6 py-4 sticky top-0 z-50 bg-[#0e0e0e]/80 backdrop-blur-2xl bg-neutral-900/50 shadow-none font-inter tracking-tight">
<div class="text-xl font-black tracking-widest text-[#d0bcff] uppercase">
            SAYAÇ
        </div>
<div class="flex gap-4">
<button class="text-[#d0bcff] hover:bg-neutral-800/40 hover:scale-110 transition-all duration-300 active:scale-95 p-2 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="add">add</span>
</button>
<button class="text-neutral-500 hover:bg-neutral-800/40 hover:scale-110 transition-all duration-300 active:scale-95 p-2 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="history">history</span>
</button>
<button class="text-neutral-500 hover:bg-neutral-800/40 hover:scale-110 transition-all duration-300 active:scale-95 p-2 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
</button>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 flex flex-col items-center justify-center p-6 pb-32">
<!-- Counter Area -->
<div class="flex flex-col items-center justify-center space-y-8 w-full max-w-md">
<!-- Label -->
<div class="text-center">
<span class="text-on-surface-variant font-label text-sm uppercase tracking-[0.2em] opacity-80">Mevcut Değer</span>
</div>
<!-- Main Value Display -->
<div class="relative w-full aspect-square max-w-[300px] flex items-center justify-center">
<!-- Ambient Glow Behind Counter -->
<div class="absolute inset-0 bg-primary/5 rounded-full blur-3xl scale-150"></div>
<div class="relative z-10 text-center">
<div class="font-display font-black text-9xl tracking-tighter text-on-surface drop-shadow-[0_0_40px_rgba(208,188,255,0.1)] leading-none transition-all duration-300 ease-out">
                        42
                    </div>
</div>
</div>
<!-- Control Buttons (Bento-style layout) -->
<div class="grid grid-cols-2 gap-4 w-full mt-12">
<!-- Decrement -->
<button class="bg-surface-container-highest/40 hover:bg-surface-container-highest/60 backdrop-blur-md rounded-2xl p-6 flex flex-col items-center justify-center gap-2 group transition-all duration-300 active:scale-95 border border-outline-variant/10">
<span class="material-symbols-outlined text-3xl text-on-surface-variant group-hover:text-on-surface transition-colors">remove</span>
<span class="font-label text-sm font-medium text-on-surface-variant">Azalt</span>
</button>
<!-- Increment (Primary) -->
<button class="bg-gradient-to-b from-[#8B5CF6] to-[#A78BFA] hover:from-[#A78BFA] hover:to-[#8B5CF6] rounded-2xl p-6 flex flex-col items-center justify-center gap-2 group transition-all duration-300 active:scale-95 shadow-[0_0_30px_rgba(139,92,246,0.3)] hover:shadow-[0_0_40px_rgba(139,92,246,0.5)]">
<span class="material-symbols-outlined text-4xl text-white">add</span>
<span class="font-label text-sm font-bold text-white">Artır</span>
</button>
</div>
<!-- Reset Button -->
<button class="mt-4 px-6 py-3 rounded-xl bg-transparent hover:bg-surface-container-low transition-colors duration-200 flex items-center gap-2 text-on-surface-variant hover:text-error transition-all group">
<span class="material-symbols-outlined text-lg group-hover:rotate-[-180deg] transition-transform duration-500">restart_alt</span>
<span class="font-label text-sm font-medium">Sıfırla</span>
</button>
</div>
</main>
<!-- BottomNavBar (Mobile Only) -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-8 pt-4 bg-[#0e0e0e]/90 backdrop-blur-3xl border-t border-white/5 shadow-[0_-8px_30px_rgb(0,0,0,0.5)] md:hidden">
<!-- Sayaç (Active) -->
<button class="flex flex-col items-center justify-center text-[#d0bcff] bg-[#8B5CF6]/10 rounded-2xl px-5 py-2 active:scale-90 transition-transform duration-200">
<span class="material-symbols-outlined mb-1" data-icon="timer" data-weight="fill" style="font-variation-settings: 'FILL' 1;">timer</span>
<span class="font-inter text-[10px] font-medium uppercase tracking-widest">Sayaç</span>
</button>
<!-- Geçmiş (Inactive) -->
<button class="flex flex-col items-center justify-center text-neutral-500 px-5 py-2 hover:text-neutral-200 transition-colors active:scale-90 transition-transform duration-200">
<span class="material-symbols-outlined mb-1" data-icon="history">history</span>
<span class="font-inter text-[10px] font-medium uppercase tracking-widest">Geçmiş</span>
</button>
<!-- Ayarlar (Inactive) -->
<button class="flex flex-col items-center justify-center text-neutral-500 px-5 py-2 hover:text-neutral-200 transition-colors active:scale-90 transition-transform duration-200">
<span class="material-symbols-outlined mb-1" data-icon="settings">settings</span>
<span class="font-inter text-[10px] font-medium uppercase tracking-widest">Ayarlar</span>
</button>
</nav>
</body></html>
